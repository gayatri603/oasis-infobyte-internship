<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Interactive Website</title>

<style>
:root{
  --primary:#6c63ff;
  --dark:#1e1e2f;
  --light:#f5f5f5;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:var(--dark);
  color:white;
  line-height:1.6;
}

header{
  text-align:center;
  padding:20px;
  background:var(--primary);
}

section{
  padding:40px 10%;
}
.carousel{
  position:relative;
  max-width:700px;
  margin:auto;
  overflow:hidden;
  border-radius:15px;
}

.carousel img{
  width:100%;
  display:none;
  border-radius:15px;
}

.carousel img.active{
  display:block;
  animation:fade 0.6s ease-in-out;
}

@keyframes fade{
  from{opacity:0;}
  to{opacity:1;}
}

.carousel button{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  border:none;
  color:white;
  padding:10px 15px;
  cursor:pointer;
  font-size:18px;
}

.prev{ left:10px; }
.next{ right:10px; }
.quiz-box{
  background:#2c2c3e;
  padding:25px;
  border-radius:10px;
  max-width:600px;
  margin:auto;
}

.quiz-box h3{
  margin-bottom:15px;
}

.options button{
  display:block;
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  background:var(--primary);
  color:white;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

.options button:hover{
  background:#5548d9;
}

.api-box{
  text-align:center;
  background:#2c2c3e;
  padding:25px;
  border-radius:10px;
  max-width:600px;
  margin:auto;
}

.api-box button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  background:var(--primary);
  color:white;
  border-radius:5px;
  cursor:pointer;
}
@media(max-width:768px){
  section{
    padding:20px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Advanced Interactive Website</h1>
</header>
<section>
  <h2>Image Carousel</h2>
  <div class="carousel">
    <img src="https://picsum.photos/id/1015/800/400" class="active">
    <img src="https://picsum.photos/id/1016/800/400">
    <img src="https://picsum.photos/id/1018/800/400">
    <button class="prev">&#10094;</button>
    <button class="next">&#10095;</button>
  </div>
</section>
<section>
  <h2>Interactive Quiz</h2>
  <div class="quiz-box">
    <h3 id="question">Question</h3>
    <div class="options" id="options"></div>
    <p id="score"></p>
  </div>
</section>
<section>
  <h2>Random Joke Generator (API)</h2>
  <div class="api-box">
    <p id="joke">Click button to load joke</p>
    <button onclick="getJoke()">Get Joke</button>
  </div>
</section>

<script>
const images = document.querySelectorAll(".carousel img");
const nextBtn = document.querySelector(".next");
const prevBtn = document.querySelector(".prev");
let index = 0;

function showSlide(i){
  images.forEach(img => img.classList.remove("active"));
  images[i].classList.add("active");
}

nextBtn.onclick = () => {
  index = (index + 1) % images.length;
  showSlide(index);
};

prevBtn.onclick = () => {
  index = (index - 1 + images.length) % images.length;
  showSlide(index);
};

setInterval(()=>{
  index = (index + 1) % images.length;
  showSlide(index);
}, 4000);

const quizData = [
  {
    question: "Which language runs in browser?",
    options: ["Python", "C++", "JavaScript", "Java"],
    answer: "JavaScript"
  },
  {
    question: "What does CSS stand for?",
    options: ["Computer Style Sheets", "Cascading Style Sheets", "Creative Style System", "Colorful Style Sheets"],
    answer: "Cascading Style Sheets"
  },
  {
    question: "Which tag is used for JavaScript?",
    options: ["<js>", "<script>", "<javascript>", "<code>"],
    answer: "<script>"
  }
];

let currentQuestion = 0;
let score = 0;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const scoreEl = document.getElementById("score");

function loadQuestion(){
  const q = quizData[currentQuestion];
  questionEl.innerText = q.question;
  optionsEl.innerHTML = "";

  q.options.forEach(option=>{
    const btn = document.createElement("button");
    btn.innerText = option;
    btn.onclick = ()=>{
      if(option === q.answer){
        score++;
      }
      currentQuestion++;
      if(currentQuestion < quizData.length){
        loadQuestion();
      } else {
        questionEl.innerText = "Quiz Completed!";
        optionsEl.innerHTML = "";
        scoreEl.innerText = "Your Score: " + score + "/" + quizData.length;
      }
    };
    optionsEl.appendChild(btn);
  });
}

loadQuestion();

async function getJoke(){
  const jokeText = document.getElementById("joke");
  jokeText.innerText = "Loading...";

  try{
    const response = await fetch("https://official-joke-api.appspot.com/random_joke");
    const data = await response.json();
    jokeText.innerText = data.setup + " 🤔 " + data.punchline;
  }catch(error){
    jokeText.innerText = "Error fetching joke!";
  }
}
</script>

</body>
</html>
